<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Student Management System</h1>

        <div class="form">
            <input type="text" id="name" placeholder="Student Name">
            <input type="number" id="roll" placeholder="Roll Number">
            <input type="text" id="course" placeholder="Course">
            <input type="number" id="marks" placeholder="Marks">

            <button onclick="addOrUpdateStudent()">
                Save Student
            </button>
        </div>

        <div class="search-box">
            <input
                type="text"
                id="search"
                placeholder="Search Student By Name"
            >
        </div>

        <div class="button-group">
            <button onclick="searchStudent()">
                Search
            </button>

            <button onclick="displayStudents(students)">
                Show All
            </button>
        </div>

        <div class="stats">
            <h3>Total Students: <span id="total">0</span></h3>
            <h3>Average Marks: <span id="average">0</span></h3>
            <h3>Highest Marks: <span id="highest">0</span></h3>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Course</th>
                    <th>Marks</th>
                    <th>Grade</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="studentList"></tbody>
        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
